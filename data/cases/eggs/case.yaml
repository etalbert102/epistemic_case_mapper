case_id: eggs
title: "Eggs and Health"
question: "What should an investigator believe about the health effects of eating eggs?"
case_type: "messy everyday evidence case"
status: draft
notes:
  - "Use as the second worked example because the case has heterogeneous populations, endpoints, and study designs."
