schema_version: 1
package_id: flf_submission
package_label: FLF Submission

ui_hero:
  eyebrow: Judge Mode
  title: See the value in one dependency.
  body: "A flat synthesis can say cosmic-ray exposure rules out LHC black-hole risk. The map preserves the judgment chain: declared sources, normalized claims, dependency handles, repairable relations, and update ledgers."
  links:
    - label: Start here
      path: docs/START_HERE.md
      primary: true
    - label: Open LHC map
      path: examples/lhc_black_holes/worked_region_cosmic_ray_map.md
    - label: Open audit
      path: examples/lhc_black_holes/decision_space_erosion_audit.md
  cards:
    - label: Flat synthesis
      text: Cosmic-ray exposure shows LHC black-hole risk is ruled out.
    - label: Hidden dependency
      text: Earth cosmic-ray survival is incomplete if LHC products are slower and more trappable.
    - label: Map surface
      text: "`lhc_c004` velocity caveat, `lhc_c012` trapping analysis, `lhc_r003`/`lhc_r004` dependency links."

