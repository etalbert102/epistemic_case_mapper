cases:
  - case_key: lhc
    case_id: lhc_black_holes
    label: LHC black holes
    case_path: data/cases/lhc_black_holes/case.yaml
    examples_path: examples/lhc_black_holes
    build_starter: true
    full_case:
      index_path: examples/lhc_black_holes/full_case_index.md
      map_path: examples/lhc_black_holes/full_case_map.md
      worked_anchor: examples/lhc_black_holes/worked_region_cosmic_ray_map.md
      baseline_path: examples/lhc_black_holes/full_case_flat_synthesis_baseline.md
      min_clusters: 8
    task_queue:
      path: examples/lhc_black_holes/investigator_task_queue.md
      prefix: lhc_task_
      min_tasks: 5
    ui:
      include: true
      label: LHC Black Hole Risk
      short_label: LHC
      theme: risk
      review_packet_path: docs/review/LHC_HUMAN_AUDIT_PACKET.md
      review_checklist_path: docs/review/LHC_HUMAN_AUDIT_CHECKLIST.csv
      multi_model_audit_path: docs/review/MULTI_MODEL_BLINDED_BASELINE_AUDIT.md
      spotlights:
        - distinction: Low-velocity LHC products may be trappable even if cosmic-ray products are not.
          flat: Flat synthesis tends to mention velocity without preserving the dependency on trapping and Earth cosmic-ray limits.
          map: The worked map preserves `lhc_c004`, `lhc_c012`, `lhc_r003`, `lhc_r004`, and `lhc_r016`.
          status: Recurring loss across model families.
        - distinction: Critique and response are multi-threaded.
          flat: A synthesis can treat the Plaga/GM exchange as a broad dispute.
          map: The map separates Plaga scenario claims, white-dwarf stopping critique, power-output response, and accretion response.
          status: Strong review target.
    worked_regions:
      - case_key: lhc
        case_label: LHC black holes
        region_id: lhc_cosmic_ray_argument
        id_prefix: lhc
        definition_path: docs/worked_regions/lhc_cosmic_ray_argument.md
        map_path: examples/lhc_black_holes/worked_region_cosmic_ray_map.md
        baseline_path: examples/lhc_black_holes/flat_synthesis_baseline.md
        audit_path: examples/lhc_black_holes/decision_space_erosion_audit.md
        best_path: examples/lhc_black_holes/BEST_REGIONS.md
        output_json_path: examples/lhc_black_holes/worked_region_cosmic_ray_map.json
        required_sources:
          - lsag_2008_safety_review
          - spc_2008_lsag_review
          - giddings_mangano_2008_stable_black_holes
          - plaga_2008_metastable_black_holes
          - giddings_mangano_2008_comments_plaga
        review:
          worked_region_id: lhc_cosmic_ray_argument
          claim_ids: [lhc_c001, lhc_c002, lhc_c003, lhc_c004, lhc_c005, lhc_c006, lhc_c007, lhc_c008, lhc_c009, lhc_c010, lhc_c011, lhc_c012, lhc_c013, lhc_c014]
          relation_ids: [lhc_r003, lhc_r004, lhc_r016]
          loss_ids: [lhc_loss_001, lhc_loss_002, lhc_loss_005, lhc_loss_006]
        blinded_baseline:
          title: LHC Blinded Flat Synthesis Baseline
          question: Does the cosmic-ray safety argument, including compact-star variants and critiques, rule out decision-relevant LHC microscopic-black-hole risk?
          output_path: examples/lhc_black_holes/blinded_flat_synthesis_baseline_gemma4.md
          required_sources:
            - lsag_2008_safety_review
            - spc_2008_lsag_review
            - giddings_mangano_2008_stable_black_holes
            - plaga_2008_metastable_black_holes
            - giddings_mangano_2008_comments_plaga
          spans:
            - source_id: lsag_2008_safety_review
              path: data/cases/lhc_black_holes/sources/text/lsag_2008_safety_review.txt
              ranges: [[119, 138], [175, 183], [193, 207], [292, 350]]
            - source_id: spc_2008_lsag_review
              path: data/cases/lhc_black_holes/sources/text/spc_2008_lsag_review.txt
              ranges: [[43, 72], [101, 140], [167, 178]]
            - source_id: giddings_mangano_2008_stable_black_holes
              path: data/cases/lhc_black_holes/sources/text/giddings_mangano_2008_stable_black_holes.txt
              ranges: [[2402, 2411], [2415, 2460], [2465, 2508], [3600, 3641], [3710, 3716]]
            - source_id: plaga_2008_metastable_black_holes
              path: data/cases/lhc_black_holes/sources/text/plaga_2008_metastable_black_holes.txt
              ranges: [[18, 31], [94, 107], [421, 430], [439, 498], [563, 606]]
            - source_id: giddings_mangano_2008_comments_plaga
              path: data/cases/lhc_black_holes/sources/text/giddings_mangano_2008_comments_plaga.txt
              ranges: [[39, 46], [61, 105]]

  - case_key: eggs
    case_id: eggs
    label: Eggs and health
    case_path: data/cases/eggs/case.yaml
    examples_path: examples/eggs
    build_starter: true
    full_case:
      index_path: examples/eggs/full_case_index.md
      map_path: examples/eggs/full_case_map.md
      worked_anchor: examples/eggs/worked_region_observational_vs_rct_map.md
      baseline_path: examples/eggs/full_case_flat_synthesis_baseline.md
      min_clusters: 7
    task_queue:
      path: examples/eggs/investigator_task_queue.md
      prefix: eggs_task_
      min_tasks: 5
    ui:
      include: true
      label: Eggs And Health
      short_label: Eggs
      theme: evidence
      review_packet_path: docs/review/EGGS_HUMAN_AUDIT_PACKET.md
      review_checklist_path: docs/review/EGGS_HUMAN_AUDIT_CHECKLIST.csv
      multi_model_audit_path: docs/review/MULTI_MODEL_BLINDED_BASELINE_AUDIT.md
      spotlights:
        - distinction: Outcome evidence and lipid-marker evidence answer different questions.
          flat: Flat synthesis can collapse randomized lipid findings into general health outcome language.
          map: The worked map preserves endpoint boundaries through `eggs_c015`, `eggs_c016`, `eggs_r005`, and `eggs_r006`.
          status: Partly preserved by stronger blinded baselines.
        - distinction: "`Up to one egg/day` has different meanings across sources."
          flat: Similar wording is easy to merge across AHA, BMJ, and NNR.
          map: The map separates public guidance, cohort conclusion, and scoping-review synthesis.
          status: Recurring scope-distinction loss.
    worked_regions:
      - case_key: eggs
        case_label: Eggs and health
        region_id: eggs_observational_vs_rct
        id_prefix: eggs
        definition_path: docs/worked_regions/eggs_observational_vs_rct.md
        map_path: examples/eggs/worked_region_observational_vs_rct_map.md
        baseline_path: examples/eggs/flat_synthesis_baseline.md
        audit_path: examples/eggs/decision_space_erosion_audit.md
        best_path: examples/eggs/BEST_REGIONS.md
        output_json_path: examples/eggs/worked_region_observational_vs_rct_map.json
        required_sources:
          - dga_2020_2025_pmc_summary
          - aha_2019_dietary_cholesterol_pubmed
          - aha_2023_dietary_cholesterol_news
          - bmj_2020_egg_consumption_cvd
          - jama_2019_dietary_cholesterol_eggs
          - li_2020_egg_cholesterol_rct_meta
          - nnr_2023_eggs_scoping_review
        review:
          worked_region_id: eggs_observational_vs_rct
          claim_ids: [eggs_c004, eggs_c008, eggs_c012, eggs_c015, eggs_c016, eggs_c018, eggs_c019]
          relation_ids: [eggs_r003, eggs_r005, eggs_r006, eggs_r007, eggs_r015]
          loss_ids: [eggs_loss_003, eggs_loss_005, eggs_loss_006, eggs_loss_007]
        blinded_baseline:
          title: Eggs Blinded Flat Synthesis Baseline
          question: How should a synthesis preserve the relationship between observational CVD outcome evidence, randomized lipid-marker evidence, guideline framing, and population/context caveats for egg consumption?
          output_path: examples/eggs/blinded_flat_synthesis_baseline_gemma4.md
          required_sources:
